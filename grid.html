 <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CSS Grid</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #cfe3cf;
}

.grid-container {
  display: grid;
  grid-template-columns: 1fr 3fr 3fr;
  grid-template-rows: auto auto auto auto;
  gap: 10px;
  padding: 20px;
}

.item {
  background: #14ffef;
  padding: 40px;
  text-align: center;
  font-weight: bold;
  border: 2px solid black;
}

/* Layout */
#item1 {
  grid-column: 1 / 4;
}

#item2 {
  grid-row: 2 / 4;
}

#item3 {
  grid-column: 2 / 4;
}

#item6 {
  grid-column: 1 / 4;
}
</style>

</head>
<body>

<h2 style="text-align:center;">CSS GRID</h2>

<div class="grid-container">
  <div class="item" id="item1">Header</div>
  <div class="item" id="item2">Side Bar</div>
  <div class="item" id="item3">Content 1</div>
  <div class="item">Content 2</div>
  <div class="item">Content 3</div>
  <div class="item" id="item6">Footer</div>
</div>

</body>
</html>
